<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management</title>
    <link rel="stylesheet" href="webclient.css">
</head>
<body data-page="login">
    <main class="page page-narrow">
        <header class="page-header">
            <h1>Login</h1>
            <p>Use your teacher or student account.</p>
        </header>

        <div id="statusBox" class="status hidden" role="status" aria-live="polite"></div>

        <section class="panel">
            <form id="loginForm" class="form-card">
                <label>
                    Account ID
                    <input type="text" name="account_id" required>
                </label>

                <label>
                    Password
                    <input type="password" name="password" required>
                </label>

                <button type="submit">Login</button>
            </form>

            <p class="auth-link">
                No account yet? <a href="register.html">Register here</a>.
            </p>
        </section>

        <noscript>
            <section class="panel">
                <p>JavaScript is required for this page.</p>
            </section>
        </noscript>
    </main>

    <script src="webclient.js"></script>
</body>
</html>
